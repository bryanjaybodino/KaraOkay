<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#333;display:flex;align-items:center;justify-content:center;height:100vh}.container{text-align:center;max-width:500px}h1{font-size:100px;margin:0;color:#e74c3c}h2{margin:10px 0;font-size:28px;font-weight:400}p{color:#666;font-size:16px;line-height:1.5}a{display:inline-block;margin-top:20px;text-decoration:none;color:#fff;background:#3498db;padding:10px 20px;border-radius:6px;transition:background 0.2s ease}a:hover{background:#2980b9}.code{font-size:14px;color:#999;margin-top:10px}
    </style>


</head>
<body>
    <div class="container">
        <h1>400</h1>
        <h2>Oops! Something’s Not Right</h2>
        <p>
            Your request couldn’t be processed. It looks like something may be missing or incorrect.<br />
            Please go back and try again.
        </p>

        <div class="code">Error Code: 400</div>
    </div>
</body>
</html>
